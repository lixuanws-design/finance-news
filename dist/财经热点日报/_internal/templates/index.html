<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>财经热点日报 - 老唐助手</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;600;700;900&family=Noto+Sans+SC:wght@300;400;500;700&display=swap');
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#f0ebe3;--paper:#fffdf5;--ink:#1a1a1a;--red:#c41e3a;--gold:#b8860b;--border:#d4c5a9;--muted:#777;--tag-bg:#fff3e0;--tag-bd:#ffb74d;--up:#e53935;--down:#2e7d32;--shadow:0 1px 4px rgba(0,0,0,.08)}
body{background:var(--bg);color:var(--ink);font-family:'Noto Sans SC',-apple-system,sans-serif;line-height:1.6}
.header{background:var(--paper);border-bottom:4px double var(--ink);padding:20px 40px;text-align:center;position:sticky;top:0;z-index:100}
.header h1{font-family:'Noto Serif SC',serif;font-size:38px;font-weight:900;letter-spacing:10px}
.header-bar{display:flex;justify-content:space-between;align-items:center;font-size:13px;color:var(--muted);border-top:1px solid var(--border);padding-top:8px;margin-top:8px}
.btn{background:var(--red);color:#fff;border:none;padding:6px 18px;border-radius:3px;cursor:pointer;font-size:13px;transition:.2s}
.btn:hover{background:#a01830}
.btn:disabled{opacity:.5;cursor:wait}
.btn-sm{padding:4px 10px;font-size:12px}
.index-bar{background:var(--ink);color:#fff;padding:10px 40px;display:flex;gap:28px;justify-content:center;overflow-x:auto}
.idx-item{display:flex;align-items:baseline;gap:6px;white-space:nowrap}
.idx-name{font-size:12px;opacity:.7}
.idx-price{font-size:18px;font-weight:700;font-family:'Courier New',monospace}
.up{color:#ff5252}.down{color:#69f0ae}.flat{color:#aaa}
.container{max-width:1500px;margin:0 auto;padding:20px 40px;display:grid;grid-template-columns:1fr 340px;gap:24px}
.section-title{font-family:'Noto Serif SC',serif;font-size:20px;font-weight:700;border-bottom:2px solid var(--ink);padding-bottom:4px;margin-bottom:14px;display:flex;align-items:center;gap:8px}
.section-title .cnt{font-size:12px;font-family:sans-serif;color:var(--muted);font-weight:400}
.stats{display:flex;gap:16px;margin-bottom:20px}
.stat-box{background:var(--paper);border:1px solid var(--border);padding:12px 18px;text-align:center;flex:1}
.stat-num{font-size:26px;font-weight:700;color:var(--red);font-family:'Courier New',monospace}
.stat-label{font-size:11px;color:var(--muted)}
.filters{display:flex;gap:6px;margin-bottom:14px;flex-wrap:wrap}
.fbtn{padding:4px 12px;border:1px solid var(--border);background:var(--paper);cursor:pointer;font-size:12px;border-radius:2px;transition:.2s}
.fbtn.active,.fbtn:hover{background:var(--ink);color:#fff;border-color:var(--ink)}
.news-card{background:var(--paper);border:1px solid var(--border);padding:16px 18px;margin-bottom:12px;transition:box-shadow .2s}
.news-card:hover{box-shadow:0 4px 14px rgba(0,0,0,.1)}
.news-card.highlight{border-left:4px solid var(--red)}
.news-src{font-size:11px;font-weight:500;color:var(--red);letter-spacing:2px}
.news-time{font-size:11px;color:var(--muted);margin-left:6px}
.news-title{font-size:15px;font-weight:600;line-height:1.5;margin:4px 0}
.news-title a{color:inherit;text-decoration:none}
.news-title a:hover{color:var(--red)}
.news-summary{font-size:13px;color:var(--muted);line-height:1.6;margin-bottom:8px}
.stock-tags{display:flex;flex-wrap:wrap;gap:5px}
.stock-tag{background:var(--tag-bg);border:1px solid var(--tag-bd);padding:2px 8px;border-radius:2px;font-size:11px;font-weight:500;cursor:default;transition:.2s}
.stock-tag:hover{background:#ffe0b2;transform:translateY(-1px)}
.stock-code{color:var(--muted);font-size:10px}
.sentiment{display:inline-block;padding:2px 8px;border-radius:2px;font-size:11px;font-weight:600}
.sent-bullish{background:#ffebee;color:var(--up)}
.sent-bearish{background:#e8f5e9;color:var(--down)}
.sent-neutral{background:#f5f5f5;color:#666}
.sidebar .sector-card{background:var(--paper);border:1px solid var(--border);padding:12px 14px;margin-bottom:8px}
.sector-name{font-weight:600;font-size:13px}
.sector-pct{font-family:'Courier New',monospace;font-weight:700;font-size:14px;margin-left:6px}
.sector-bar{height:3px;border-radius:2px;margin-top:6px;background:#eee;overflow:hidden}
.sector-fill{height:100%;border-radius:2px;transition:width .6s}
.loading{text-align:center;padding:40px;color:var(--muted)}
.spinner{width:36px;height:36px;border:3px solid var(--border);border-top-color:var(--red);border-radius:50%;animation:spin .8s linear infinite;margin:0 auto 12px}
@keyframes spin{to{transform:rotate(360deg)}}
.modal-bg{display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.5);z-index:200;align-items:center;justify-content:center}
.modal-bg.show{display:flex}
.modal{background:var(--paper);border-radius:4px;padding:28px;max-width:600px;width:90%;max-height:80vh;overflow-y:auto;box-shadow:0 8px 32px rgba(0,0,0,.3)}
.modal h3{font-size:18px;margin-bottom:12px}
.modal p{font-size:14px;line-height:1.7;margin-bottom:8px}
.modal-close{float:right;cursor:pointer;font-size:20px;color:var(--muted);background:none;border:none}
.analysis-section{margin:12px 0}
.analysis-section h4{font-size:14px;font-weight:600;margin-bottom:6px}
.analysis-section ul{padding-left:18px}
.analysis-section li{font-size:13px;margin-bottom:4px}
@media(max-width:900px){.container{grid-template-columns:1fr;padding:12px}.header{padding:14px 16px}.header h1{font-size:24px;letter-spacing:4px}.index-bar{padding:8px 12px;gap:12px}}
</style>
</head>
<body>
<div class="header">
  <h1>财经热点日报 - 老唐助手</h1>
  <div class="header-bar">
    <span id="dateStr"></span>
    <span>FINANCIAL NEWS DIGEST</span>
    <button class="btn" id="refreshBtn" onclick="loadData(true)">刷新数据</button>
  </div>
</div>
<div class="index-bar" id="indexBar"><div class="loading" style="padding:8px"><div class="spinner" style="width:18px;height:18px"></div></div></div>
<div class="container">
  <div class="main">
    <div class="stats">
      <div class="stat-box"><div class="stat-num" id="sNews">-</div><div class="stat-label">今日新闻</div></div>
      <div class="stat-box"><div class="stat-num" id="sAnalyzed">-</div><div class="stat-label">关联分析</div></div>
      <div class="stat-box"><div class="stat-num" id="sStocks">-</div><div class="stat-label">涉及股票</div></div>
      <div class="stat-box"><div class="stat-num" id="sSectors">-</div><div class="stat-label">活跃板块</div></div>
    </div>
    <div class="section-title">今日热点关联 A 股 <span class="cnt" id="hotCnt"></span></div>
    <div class="filters" id="filters"></div>
    <div id="newsList"><div class="loading"><div class="spinner"></div>正在抓取财经数据...</div></div>
  </div>
  <div class="sidebar">
    <div class="section-title">热门板块</div>
    <div id="sectorList"><div class="loading"><div class="spinner" style="width:24px;height:24px"></div></div></div>
    <div class="section-title" style="margin-top:20px">热门涨幅股</div>
    <div id="stockList"></div>
  </div>
</div>
<div class="modal-bg" id="modal" onclick="if(event.target===this)closeModal()">
  <div class="modal">
    <button class="modal-close" onclick="closeModal()">&times;</button>
    <div id="modalContent"><div class="loading"><div class="spinner"></div>AI 分析中...</div></div>
  </div>
</div>
<script>
const $=id=>document.getElementById(id);
let allData=null,activeFilter='all';
$('dateStr').textContent=new Date().toLocaleDateString('zh-CN',{year:'numeric',month:'long',day:'numeric',weekday:'long'});
const pctC=v=>v>0?'up':v<0?'down':'flat';
const pctT=v=>v>0?`+${v}%`:`${v}%`;

function renderIndices(d){
  if(!d.length){$('indexBar').innerHTML='<span style="opacity:.5">暂无数据</span>';return}
  $('indexBar').innerHTML=d.map(i=>`<div class="idx-item"><span class="idx-name">${i.name}</span><span class="idx-price ${pctC(i.change_pct)}">${i.price}</span><span class="${pctC(i.change_pct)}">${pctT(i.change_pct)}</span></div>`).join('');
}
function renderSectors(d){
  if(!d.length){$('sectorList').innerHTML='<div style="color:#999;text-align:center;padding:16px">暂无数据</div>';return}
  const mx=Math.max(...d.map(s=>Math.abs(s.change_pct)),1);
  $('sectorList').innerHTML=d.map(s=>{const p=s.change_pct,w=Math.min(Math.abs(p)/mx*100,100),c=p>=0?'#e53935':'#2e7d32';
    return`<div class="sector-card"><span class="sector-name">${s.name}</span><span class="sector-pct ${pctC(p)}">${pctT(p)}</span><div class="sector-bar"><div class="sector-fill" style="width:${w}%;background:${c}"></div></div></div>`}).join('');
}
function renderHotStocks(d){
  if(!d.length)return;
  $('stockList').innerHTML=d.map(s=>`<div class="sector-card" style="cursor:pointer" onclick="showStockDetail('${s.code}','${s.name}')"><span class="sector-name">${s.name}</span><span style="font-size:11px;color:#999;margin-left:4px">${s.code}</span><span class="sector-pct ${pctC(parseFloat(s.change_pct))}">${s.change_pct}%</span></div>`).join('');
}
function renderFilters(news){
  const src={};news.forEach(n=>{src[n.source]=(src[n.source]||0)+1});
  let h=`<button class="fbtn ${activeFilter==='all'?'active':''}" onclick="setF('all')">全部 (${news.length})</button>`;
  for(const[s,c]of Object.entries(src))h+=`<button class="fbtn ${activeFilter===s?'active':''}" onclick="setF('${s}')">${s} (${c})</button>`;
  $('filters').innerHTML=h;
}
function setF(f){activeFilter=f;renderNews(allData.news_with_stocks);renderFilters(allData.news_with_stocks)}
function renderNews(news){
  const d=activeFilter==='all'?news:news.filter(n=>n.source===activeFilter);
  $('hotCnt').textContent=`${d.length} 条`;
  if(!d.length){$('newsList').innerHTML='<div style="color:#999;text-align:center;padding:30px">暂无匹配新闻</div>';return}
  $('newsList').innerHTML=d.map(n=>{
    const st=n.stocks&&n.stocks.length?`<div class="stock-tags">${n.stocks.map(s=>`<span class="stock-tag" onclick="showStockDetail('${s.code}','${s.name}')" style="cursor:pointer">📈 ${s.name} <span class="stock-code">${s.code}</span></span>`).join('')}</div>`:'';
    const sent=n.sentiment?`<span class="sentiment sent-${n.sentiment}">${n.sentiment==='bullish'?'看多':n.sentiment==='bearish'?'看空':'中性'}</span>`:'';
    const link=n.url?`<a href="${n.url}" target="_blank">${n.title}</a>`:n.title;
    const time=n.time?`<span class="news-time">${n.time}</span>`:'';
    const analyzeBtn=n.url?`<button class="btn btn-sm" onclick="analyzeArticle('${n.url.replace(/'/g,"\\'")}',this)" style="margin-top:6px">AI 深度分析</button>`:'';
    return`<div class="news-card ${st?'highlight':''}"><div class="news-src">${n.source}${time} ${sent}</div><div class="news-title">${link}</div>${n.summary?`<div class="news-summary">${n.summary.slice(0,150)}</div>`:''}${st}${analyzeBtn}</div>`}).join('');
}
function updateStats(d){
  $('sNews').textContent=d.total_news;$('sAnalyzed').textContent=d.analyzed_news;
  const sc=new Set();(d.news_with_stocks||[]).forEach(n=>(n.stocks||[]).forEach(s=>sc.add(s.code)));
  $('sStocks').textContent=sc.size;$('sSectors').textContent=(d.sectors||[]).length;
}
async function loadData(force=false){
  const btn=$('refreshBtn');btn.disabled=true;btn.textContent='加载中...';
  try{
    const r=await fetch(`/api/dashboard${force?'?force=1':''}`);allData=await r.json();
    renderIndices(allData.indices||[]);renderSectors(allData.sectors||[]);
    renderHotStocks(allData.hot_stocks||[]);renderNews(allData.news_with_stocks||[]);
    renderFilters(allData.news_with_stocks||[]);updateStats(allData);
  }catch(e){$('newsList').innerHTML=`<div style="color:red;text-align:center;padding:30px">加载失败: ${e.message}<br><button class="btn" onclick="loadData(true)" style="margin-top:10px">重试</button></div>`}
  finally{btn.disabled=false;btn.textContent='刷新数据'}
}
async function analyzeArticle(url,btn){
  const orig=btn.textContent;btn.textContent='分析中...';btn.disabled=true;
  $('modal').classList.add('show');$('modalContent').innerHTML='<div class="loading"><div class="spinner"></div>AI 正在分析文章...</div>';
  try{
    const r=await fetch('/api/analyze',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({url})});
    const d=await r.json();
    const sentimentMap={bullish:'📈 看多',bearish:'📉 看空',neutral:'➡️ 中性'};
    const stocksHtml=(d.stocks_mentioned||d.stocks||[]).map(s=>`<li><b>${s.name}</b> ${s.code||''} — ${s.reason||s.keyword||''}</li>`).join('');
    const industries=(d.industries||[]).map(i=>`<span class="stock-tag">${i}</span>`).join('');
    const risks=(d.risk_factors||[]).map(r=>`<li>${r}</li>`).join('');
    $('modalContent').innerHTML=`<h3>${d.summary||'分析结果'}</h3>
      <div class="analysis-section"><h4>情绪: ${sentimentMap[d.sentiment]||d.sentiment} ${d.time_horizon?'| 时间维度: '+d.time_horizon:''} ${d.confidence?'| 置信度: '+Math.round(d.confidence*100)+'%':''}</h4></div>
      ${industries?`<div class="analysis-section"><h4>涉及行业</h4><div>${industries}</div></div>`:''}
      ${stocksHtml?`<div class="analysis-section"><h4>关联股票</h4><ul>${stocksHtml}</ul></div>`:''}
      ${risks?`<div class="analysis-section"><h4>风险因素</h4><ul>${risks}</ul></div>`:''}
      <p style="font-size:11px;color:#999;margin-top:12px">${d.ai_generated?'🤖 AI 生成分析':'📊 关键词匹配分析'}</p>`;
  }catch(e){$('modalContent').innerHTML=`<p style="color:red">分析失败: ${e.message}</p>`}
  finally{btn.textContent=orig;btn.disabled=false}
}
function showStockDetail(code,name){window.open(`https://quote.eastmoney.com/${code.startsWith('6')?'sh':'sz'}${code}.html`,'_blank')}
function closeModal(){$('modal').classList.remove('show')}
document.addEventListener('keydown',e=>{if(e.key==='Escape')closeModal()});
loadData();
</script>
</body>
</html>
